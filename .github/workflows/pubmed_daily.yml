name: PubMed Cancer Research Daily Brief

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pubmed-daily-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily brief
        env:
          NCBI_EMAIL: changzh@cmu.edu.cn
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4.1-mini' }}
        run: python main.py

      - name: Commit report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add daily PubMed cancer brief"
          file_pattern: "reports/*.md reports/*.docx data/seen_pmids.json logs/*.log"
